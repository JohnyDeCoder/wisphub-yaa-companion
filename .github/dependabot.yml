version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      npm-production:
        dependency-type: production
      npm-dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: "chore"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
